name: Publish Packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Publish packages
        run: |
          for pkg in packages/mesh-observe packages/mesh-core packages/mesh-llm packages/mesh-coordination packages/mesh-channels-whatsapp packages/mesh-channels-sms packages/mesh-channels-slack packages/mesh-postgres packages/mesh-mcp packages/mesh-compose packages/mesh-eval packages/mesh-campaign packages/mesh-social packages/mesh-analytics; do
            if [ -d "$pkg/dist" ]; then
              echo "Publishing $pkg..."
              cd "$pkg"
              npm publish --access public --provenance || echo "Skipped (already published or error)"
              cd ../..
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
